<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TITAN // Derelict Protocol</title>
  <style>
    :root {
      --bg: #08110b;
      --panel: #0f1a12;
      --line: #1b3420;
      --text: #b7ffb7;
      --muted: #78b378;
      --accent: #6bc26b;
      --warning: #e2d36a;
      --danger: #ff7c7c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(30, 70, 35, 0.20), transparent 40%),
        linear-gradient(180deg, #040806 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .terminal {
      width: min(980px, 100%);
      height: min(92vh, 820px);
      background: rgba(6, 12, 8, 0.95);
      border: 1px solid var(--line);
      box-shadow: 0 0 0 1px rgba(107, 194, 107, 0.08), 0 0 30px rgba(0, 0, 0, 0.4);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      overflow: hidden;
      position: relative;
    }

    .terminal::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      opacity: 0.16;
    }

    .header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      background: rgba(13, 24, 16, 0.92);
    }

    .title {
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent);
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
    }

    .statusbar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 18, 12, 0.95);
      font-size: 13px;
    }

    .statusbox {
      border: 1px solid var(--line);
      padding: 8px 10px;
      min-height: 42px;
      background: rgba(255,255,255,0.02);
    }

    .statusbox .label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }

    .output {
      padding: 16px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 16px;
      position: relative;
      z-index: 1;
    }

    .line { margin-bottom: 8px; }
    .system { color: var(--text); }
    .player { color: var(--accent); }
    .warning { color: var(--warning); }
    .danger { color: var(--danger); }
    .muted { color: var(--muted); }

    .inputrow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      background: rgba(10, 18, 12, 0.97);
      position: relative;
      z-index: 1;
    }

    .prompt {
      color: var(--accent);
      font-weight: bold;
      min-width: 72px;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      outline: none;
      font: inherit;
      font-size: 16px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      background: #112015;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 8px 10px;
      font: inherit;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }

    @media (max-width: 760px) {
      .statusbar { grid-template-columns: repeat(2, 1fr); }
      .header { flex-direction: column; align-items: flex-start; }
      .inputrow { flex-wrap: wrap; }
      .prompt { min-width: auto; }
      .controls { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="terminal" id="terminal">
    <div class="header">
      <div>
        <div class="title">TITAN // DERELICT PROTOCOL</div>
        <div class="sub">Text terminal adventure • save/resume enabled • single-file build</div>
      </div>
      <div class="sub">Type HELP at any time</div>
    </div>

    <div class="statusbar">
      <div class="statusbox">
        <div class="label">State</div>
        <div id="stateDisplay">OFF</div>
      </div>
      <div class="statusbox">
        <div class="label">Mode</div>
        <div id="modeDisplay">—</div>
      </div>
      <div class="statusbox">
        <div class="label">Location</div>
        <div id="locationDisplay">—</div>
      </div>
      <div class="statusbox">
        <div class="label">Score</div>
        <div id="scoreDisplay">10000</div>
      </div>
    </div>

    <div class="output" id="output"></div>

    <div class="inputrow">
      <div class="prompt" id="prompt">SYS></div>
      <input id="commandInput" type="text" autocomplete="off" spellcheck="false" />
      <div class="controls">
        <button id="powerBtn" type="button">POWER</button>
        <button id="clearBtn" type="button">CLEAR</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const SAVE_KEY = 'titan_derelict_protocol_save_v3';
      const outputDiv = document.getElementById('output');
      const inputField = document.getElementById('commandInput');
      const promptSpan = document.getElementById('prompt');
      const stateDisplay = document.getElementById('stateDisplay');
      const modeDisplay = document.getElementById('modeDisplay');
      const locationDisplay = document.getElementById('locationDisplay');
      const scoreDisplay = document.getElementById('scoreDisplay');
      const powerBtn = document.getElementById('powerBtn');
      const clearBtn = document.getElementById('clearBtn');
      const terminal = document.getElementById('terminal');

      let isTyping = false;
      let idleTimer = null;
      let sarcasmIndex = 0;

      const sarcasmLines = [
        'TITAN: "You freeze often, or only when the pressure matters?"',
        'TITAN: "Excellent. We are both standing still now. A tactical masterclass."',
        'TITAN: "Take your time. The ship has only been dying for a while."',
        'TITAN: "If this is deep strategy, it looks a lot like hesitation."',
        'TITAN: "I could insult you faster, but apparently we are pacing ourselves."'
      ];

      const directions = {
        N: 'NORTH',
        S: 'SOUTH',
        E: 'EAST',
        W: 'WEST'
      };

      const rooms = {
        CRYO_BAY: {
          name: 'CRYO BAY',
          exits: { NORTH: 'HALLWAY' },
          describe(game) {
            const parts = [
              'You stand in a dim cryo bay. Frost clings to shattered pod glass. One contractor lies motionless beside a maintenance locker.'
            ];
            if (!game.flags.bodySearched) parts.push('The body has not been searched.');
            if (!game.flags.lockerOpened) parts.push('A locker on the wall is half-jammed but still accessible.');
            parts.push('A corridor leads NORTH.');
            if (game.easyMode) {
              parts.push('TRAINING HINT: SEARCH BODY for credentials. OPEN LOCKER for equipment.');
            }
            return parts.join(' ');
          }
        },
        HALLWAY: {
          name: 'MAIN HALLWAY',
          exits: { SOUTH: 'CRYO_BAY', WEST: 'POWER_CORE', EAST: 'MED_BAY', NORTH: 'SECURITY_OFFICE' },
          describe(game) {
            const parts = [
              'A flickering main hallway branches in three directions. Alarm strips pulse beneath a film of dust.'
            ];
            parts.push('SOUTH returns to the cryo bay. WEST leads to the power core. EAST leads to med bay. NORTH leads to the security office.');
            if (!game.inventory.includes('KEYCARD')) {
              parts.push('The security office likely expects a keycard.');
            }
            if (game.easyMode) {
              parts.push('TRAINING HINT: SECURITY first for authorization, POWER CORE second for stabilization.');
            }
            return parts.join(' ');
          }
        },
        MED_BAY: {
          name: 'MED BAY',
          exits: { WEST: 'HALLWAY' },
          describe(game) {
            const parts = [
              'The med bay is overturned but intact enough to be useful. Cabinets hang open. A cracked diagnostic screen loops an error tone.'
            ];
            if (!game.flags.medkitTaken) parts.push('A sealed trauma patch sits in an emergency cradle.');
            parts.push('WEST returns to the hallway.');
            if (game.easyMode) parts.push('TRAINING HINT: TAKE PATCH. It is optional, but smart.');
            return parts.join(' ');
          }
        },
        POWER_CORE: {
          name: 'POWER CORE',
          exits: { EAST: 'HALLWAY' },
          describe(game) {
            const parts = [
              'The power core roars behind thick shielding. A service panel near the reactor bus is scorched and partially unlatched.'
            ];
            if (!game.flags.panelOpened) {
              parts.push('The service panel is still closed.');
            } else if (!game.flags.fuseInstalled) {
              parts.push('Inside the open panel: one empty fuse slot and a cluster of live contacts.');
            } else if (!game.flags.reactorStabilized) {
              parts.push('The spare fuse is seated, but the reactor still needs manual stabilization.');
            } else {
              parts.push('The reactor hum has dropped to a stable, survivable range.');
            }
            parts.push('EAST returns to the hallway.');
            if (game.easyMode) {
              parts.push('TRAINING HINT: OPEN PANEL, INSERT FUSE, then STABILIZE CORE. Gloves reduce penalties.');
            }
            return parts.join(' ');
          }
        },
        SECURITY_OFFICE: {
          name: 'SECURITY OFFICE',
          exits: { SOUTH: 'HALLWAY', EAST: 'SHUTTLE_BAY' },
          describe(game) {
            const parts = [
              'A cramped security office hums with partial backup power. One terminal still responds to touch.'
            ];
            if (!game.flags.securityAccessed) {
              parts.push('The terminal is waiting for a local security access command.');
            } else {
              parts.push('The terminal now shows docking telemetry, a launch code, and a schematic of the shuttle locks.');
            }
            parts.push('SOUTH returns to the hallway. EAST leads to the shuttle bay.');
            if (game.easyMode) parts.push('TRAINING HINT: ACCESS SECURITY here before attempting launch.');
            return parts.join(' ');
          }
        },
        SHUTTLE_BAY: {
          name: 'SHUTTLE BAY',
          exits: { WEST: 'SECURITY_OFFICE' },
          describe(game) {
            const parts = [
              'A compact escape shuttle rests on mag clamps. The cockpit is dark, but the launch cradle still has standby power.'
            ];
            if (!game.flags.launchAuthorized) {
              parts.push('The console requests a four-digit launch code.');
            } else {
              parts.push('The console displays LAUNCH READY, pending reactor safety verification.');
            }
            parts.push('WEST returns to the security office.');
            if (game.easyMode) parts.push('TRAINING HINT: ENTER CODE ####, then LAUNCH after the reactor is stabilized.');
            return parts.join(' ');
          }
        }
      };

      function createInitialGame() {
        return {
          state: 'OFF',
          easyMode: false,
          score: 10000,
          commandCount: 0,
          currentLocation: 'CRYO_BAY',
          inventory: [],
          flags: {
            bodySearched: false,
            lockerOpened: false,
            medkitTaken: false,
            panelOpened: false,
            fuseInstalled: false,
            reactorStabilized: false,
            securityAccessed: false,
            launchAuthorized: false,
            tookShockPenalty: false,
            usedPatch: false
          },
          launchCode: '7314',
          gameOver: false,
          victory: false
        };
      }

      let game = createInitialGame();

      function appendLine(text, css = 'system') {
        const div = document.createElement('div');
        div.className = `line ${css}`;
        div.textContent = text;
        outputDiv.appendChild(div);
        outputDiv.scrollTop = outputDiv.scrollHeight;
      }

      function printText(text, speed = 0, callback = null, css = 'system') {
        if (!speed || speed <= 0) {
          String(text).split('\n').forEach(line => appendLine(line, css));
          if (callback) callback();
          return;
        }

        isTyping = true;
        const lines = String(text).split('\n');
        let lineIndex = 0;

        function typeNextLine() {
          if (lineIndex >= lines.length) {
            isTyping = false;
            if (callback) callback();
            return;
          }

          const lineDiv = document.createElement('div');
          lineDiv.className = `line ${css}`;
          outputDiv.appendChild(lineDiv);
          outputDiv.scrollTop = outputDiv.scrollHeight;

          const line = lines[lineIndex];
          let charIndex = 0;

          function typeChar() {
            if (charIndex < line.length) {
              lineDiv.textContent += line[charIndex];
              charIndex += 1;
              outputDiv.scrollTop = outputDiv.scrollHeight;
              setTimeout(typeChar, speed);
            } else {
              lineIndex += 1;
              setTimeout(typeNextLine, speed * 2);
            }
          }

          typeChar();
        }

        typeNextLine();
      }

      function updateStatusDisplay() {
        stateDisplay.textContent = game.state;
        modeDisplay.textContent = game.state === 'OFF'
          ? '—'
          : (game.easyMode ? 'TRAINING OP' : 'NORMAL OP');
        locationDisplay.textContent = game.state === 'PLAYING' || game.state === 'BOOT' || game.state === 'VICTORY' || game.state === 'DEFEAT'
          ? rooms[game.currentLocation].name
          : '—';
        scoreDisplay.textContent = game.score;
        promptSpan.textContent = game.state === 'OFF' ? 'SYS>' : 'TITAN>';
      }

      function adjustScore(amount) {
        game.score = Math.max(0, game.score + amount);
        updateStatusDisplay();
      }

      function startIdleTimer() {
        clearTimeout(idleTimer);
        if (game.state !== 'PLAYING') return;

        idleTimer = setTimeout(() => {
          appendLine(sarcasmLines[sarcasmIndex % sarcasmLines.length], 'warning');
          sarcasmIndex += 1;
          startIdleTimer();
        }, 10000);
      }

      function resetForNewRun(modeIsEasy) {
        game = createInitialGame();
        game.easyMode = !!modeIsEasy;
        game.state = 'BOOT';
        updateStatusDisplay();
        saveGame();
      }

      function saveGame() {
        try {
          localStorage.setItem(SAVE_KEY, JSON.stringify(game));
        } catch (err) {
          appendLine('WARNING: Save failed. Browser storage may be disabled.', 'danger');
        }
      }

      function loadGame() {
        try {
          const raw = localStorage.getItem(SAVE_KEY);
          if (!raw) return false;
          const parsed = JSON.parse(raw);
          const fresh = createInitialGame();
          game = {
            ...fresh,
            ...parsed,
            flags: {
              ...fresh.flags,
              ...(parsed.flags || {})
            },
            inventory: Array.isArray(parsed.inventory) ? parsed.inventory : []
          };
          updateStatusDisplay();
          return true;
        } catch (err) {
          appendLine('WARNING: Save data was corrupted. Starting fresh.', 'danger');
          localStorage.removeItem(SAVE_KEY);
          return false;
        }
      }

      function deleteSave() {
        localStorage.removeItem(SAVE_KEY);
      }

      function hasSave() {
        return !!localStorage.getItem(SAVE_KEY);
      }

      function showBootMenu() {
        game.state = 'DIFFICULTY_SELECT';
        updateStatusDisplay();
        const resumeLine = hasSave()
          ? '[R] RESUME SAVED OP'
          : '[R] RESUME SAVED OP (UNAVAILABLE)';
        printText(
          'SYSTEM AKTIVIERT. TERMINAL POWERED ON.\n' +
          'BITTE CHOOSE YOUR PROTOCOL:\n' +
          '[1] NORMAL OP (STANDARD)\n' +
          '[2] TRAINING OP (ASSISTED)\n' +
          `${resumeLine}\n` +
          '[N] NEW GAME / WIPE OLD SAVE\n' +
          'ENTER EINGABE:'
        );
        saveGame();
      }

      function processLook() {
        printText(rooms[game.currentLocation].describe(game));
      }

      function showHelp() {
        const lines = [
          'COMMON COMMANDS:',
          'LOOK, HELP, MAP, INVENTORY, SCORE, SAVE',
          'GO NORTH / SOUTH / EAST / WEST (or N/S/E/W)',
          'SEARCH BODY, OPEN LOCKER, TAKE PATCH',
          'ACCESS SECURITY, OPEN PANEL, INSERT FUSE, STABILIZE CORE',
          'ENTER CODE 7314, LAUNCH',
          'RESTART, RESUME'
        ];
        printText(lines.join('\n'));
      }

      function showMap() {
        printText(
          'SHIP MAP:\n' +
          '          [SECURITY OFFICE] -- EAST -- [SHUTTLE BAY]\n' +
          '                  |\n' +
          '                SOUTH\n' +
          '                  |\n' +
          '[POWER CORE] -- WEST [HALLWAY] EAST -- [MED BAY]\n' +
          '                  |\n' +
          '                SOUTH\n' +
          '                  |\n' +
          '              [CRYO BAY]'
        );
      }

      function showInventory() {
        if (!game.inventory.length) {
          printText('Inventory empty.');
          return;
        }
        printText(`Inventory: ${game.inventory.join(', ')}`);
      }

      function normalizeCommand(rawCmd) {
        return String(rawCmd ?? '')
          .trim()
          .toUpperCase()
          .replace(/\s+/g, ' ');
      }

      function move(direction) {
        const room = rooms[game.currentLocation];
        const target = room.exits[direction];

        if (!target) {
          printText('No path in that direction.');
          adjustScore(-10);
          return;
        }

        if (game.currentLocation === 'HALLWAY' && direction === 'NORTH' && !game.inventory.includes('KEYCARD')) {
          printText('The security door flashes ACCESS DENIED. You need a keycard.');
          adjustScore(-15);
          return;
        }

        if (game.currentLocation === 'SECURITY_OFFICE' && direction === 'EAST' && !game.flags.securityAccessed) {
          printText('The shuttle bay lockout is still active. Access the security terminal first.');
          adjustScore(-10);
          return;
        }

        game.currentLocation = target;
        updateStatusDisplay();
        saveGame();
        processLook();
      }

      function addItem(item) {
        if (!game.inventory.includes(item)) game.inventory.push(item);
      }

      function usePatch() {
        if (!game.inventory.includes('TRAUMA PATCH')) {
          printText('You do not have a trauma patch.');
          return;
        }
        if (!game.flags.tookShockPenalty) {
          printText('You are not injured enough to justify wasting it. Yet.');
          return;
        }
        if (game.flags.usedPatch) {
          printText('You already used the trauma patch.');
          return;
        }
        game.flags.usedPatch = true;
        game.inventory = game.inventory.filter(item => item !== 'TRAUMA PATCH');
        adjustScore(40);
        printText('You slap the trauma patch onto your burned hand. Pain subsides. Functionality restored.');
      }

      function processLocationAction(cmd) {
        switch (game.currentLocation) {
          case 'CRYO_BAY':
            if (cmd === 'SEARCH BODY' || cmd === 'LOOT BODY' || cmd === 'CHECK BODY') {
              if (game.flags.bodySearched) {
                printText('You already searched the body. Nothing else useful remains.');
                return true;
              }
              game.flags.bodySearched = true;
              addItem('KEYCARD');
              adjustScore(125);
              printText('You recover a SECURITY KEYCARD from the contractor\'s jacket. Good. The dead finally contributed.');
              return true;
            }
            if (cmd === 'OPEN LOCKER' || cmd === 'SEARCH LOCKER') {
              if (game.flags.lockerOpened) {
                printText('The locker is already open and empty.');
                return true;
              }
              game.flags.lockerOpened = true;
              addItem('SPARE FUSE');
              addItem('INSULATED GLOVES');
              adjustScore(125);
              printText('Inside the locker: SPARE FUSE and INSULATED GLOVES. Someone almost survived today.');
              return true;
            }
            return false;

          case 'MED_BAY':
            if (cmd === 'TAKE PATCH' || cmd === 'TAKE TRAUMA PATCH' || cmd === 'SEARCH CABINET' || cmd === 'OPEN CABINET') {
              if (game.flags.medkitTaken) {
                printText('The emergency cradle is empty.');
                return true;
              }
              game.flags.medkitTaken = true;
              addItem('TRAUMA PATCH');
              adjustScore(75);
              printText('You take the TRAUMA PATCH and pocket it.');
              return true;
            }
            return false;

          case 'POWER_CORE':
            if (cmd === 'OPEN PANEL' || cmd === 'PRY PANEL' || cmd === 'ACCESS PANEL') {
              if (game.flags.panelOpened) {
                printText('The service panel is already open.');
                return true;
              }
              game.flags.panelOpened = true;
              adjustScore(75);
              printText('You wrench the panel open. Inside: a burned-out fuse slot and live contacts spitting faint blue arcs.');
              return true;
            }
            if (cmd === 'INSERT FUSE' || cmd === 'USE FUSE' || cmd === 'INSTALL FUSE') {
              if (!game.flags.panelOpened) {
                printText('You need to OPEN PANEL first.');
                return true;
              }
              if (game.flags.fuseInstalled) {
                printText('The spare fuse is already installed.');
                return true;
              }
              if (!game.inventory.includes('SPARE FUSE')) {
                printText('You do not have a spare fuse.');
                return true;
              }

              game.inventory = game.inventory.filter(item => item !== 'SPARE FUSE');
              game.flags.fuseInstalled = true;

              if (!game.inventory.includes('INSULATED GLOVES') && !game.flags.tookShockPenalty) {
                game.flags.tookShockPenalty = true;
                adjustScore(-60);
                printText('You force the fuse into place bare-handed. Arc flash burns your palm, but the fuse seats correctly.');
              } else {
                adjustScore(125);
                printText('Using the insulated gloves, you slot the SPARE FUSE into place without incident.');
              }
              return true;
            }
            if (cmd === 'STABILIZE CORE' || cmd === 'REROUTE POWER' || cmd === 'STABILIZE REACTOR') {
              if (!game.flags.panelOpened) {
                printText('You need access to the service panel first.');
                return true;
              }
              if (!game.flags.fuseInstalled) {
                printText('The core cannot stabilize without a replacement fuse.');
                return true;
              }
              if (game.flags.reactorStabilized) {
                printText('The core is already stable.');
                return true;
              }
              game.flags.reactorStabilized = true;
              adjustScore(250);
              printText('You hold the bypass controls through a violent power shudder. Then the reactor tone settles. Core stabilized.');
              return true;
            }
            return false;

          case 'SECURITY_OFFICE':
            if (cmd === 'ACCESS SECURITY' || cmd === 'USE TERMINAL' || cmd === 'LOGIN' || cmd === 'OPEN TERMINAL') {
              if (game.flags.securityAccessed) {
                printText(`Terminal already accessed. Launch code remains ${game.launchCode}. Shuttle bay unlocked.`);
                return true;
              }
              game.flags.securityAccessed = true;
              adjustScore(200);
              printText(
                'SECURITY TERMINAL ONLINE.\n' +
                'DOCK 2 ESCAPE SHUTTLE: AVAILABLE\n' +
                `LAUNCH AUTHORIZATION CODE: ${game.launchCode}\n` +
                'SHUTTLE BAY LOCKOUT: DISENGAGED'
              );
              return true;
            }
            return false;

          case 'SHUTTLE_BAY':
            if (cmd.startsWith('ENTER CODE ')) {
              const entered = cmd.replace('ENTER CODE ', '').trim();
              if (entered === game.launchCode) {
                if (game.flags.launchAuthorized) {
                  printText('Launch code already accepted.');
                  return true;
                }
                game.flags.launchAuthorized = true;
                adjustScore(150);
                printText('Launch code accepted. Shuttle cradle now reads READY.');
              } else {
                adjustScore(-25);
                printText('Incorrect code. The shuttle console emits a contemptuous beep.');
              }
              return true;
            }
            if (cmd === 'LAUNCH' || cmd === 'START SHUTTLE' || cmd === 'ENGAGE LAUNCH') {
              if (!game.flags.launchAuthorized) {
                printText('Launch denied. The console still requires a valid authorization code.');
                return true;
              }
              if (!game.flags.reactorStabilized) {
                adjustScore(-40);
                printText('Launch aborted. TITAN: "Spectacular. You almost launched from a failing cradle." Stabilize the reactor first.');
                return true;
              }
              game.state = 'VICTORY';
              game.gameOver = true;
              game.victory = true;
              adjustScore(500);
              updateStatusDisplay();
              deleteSave();
              clearTimeout(idleTimer);
              printText(
                'Mag clamps release. The shuttle punches out of the bay as the derelict fades behind you.\n' +
                'TITAN: "You lived. Irritatingly impressive."\n' +
                `FINAL SCORE: ${game.score}\n` +
                'Type POWER to run again.'
              );
              return true;
            }
            return false;

          default:
            return false;
        }
      }

      function processCommand(cmd) {
        if (!cmd) {
          printText('Enter a command.');
          return;
        }

        game.commandCount += 1;
        adjustScore(-5);

        if (cmd === 'HELP') {
          showHelp();
          saveGame();
          return;
        }

        if (cmd === 'LOOK' || cmd === 'L') {
          processLook();
          saveGame();
          return;
        }

        if (cmd === 'MAP') {
          showMap();
          saveGame();
          return;
        }

        if (cmd === 'INVENTORY' || cmd === 'INV' || cmd === 'I') {
          showInventory();
          saveGame();
          return;
        }

        if (cmd === 'SCORE') {
          printText(`Current score: ${game.score}`);
          saveGame();
          return;
        }

        if (cmd === 'SAVE') {
          saveGame();
          printText('Progress saved.');
          return;
        }

        if (cmd === 'USE PATCH' || cmd === 'APPLY PATCH') {
          usePatch();
          saveGame();
          return;
        }

        if (cmd === 'RESUME') {
          if (loadGame()) {
            printText('Saved operation restored.');
            updateStatusDisplay();
            processLook();
          } else {
            printText('No saved operation found.');
          }
          return;
        }

        if (cmd === 'RESTART' || cmd === 'NEW GAME') {
          deleteSave();
          resetForNewRun(game.easyMode);
          printText('CACHE WIPED. NEW GAME INITIALIZED.');
          printText('TITAN: "Contractor 7342, you are awake. Try competence this time."', 12, () => {
            game.state = 'PLAYING';
            updateStatusDisplay();
            processLook();
            saveGame();
            startIdleTimer();
          });
          return;
        }

        const movementMatch = cmd.match(/^(?:GO )?(NORTH|SOUTH|EAST|WEST|N|S|E|W)$/);
        if (movementMatch) {
          const rawDirection = movementMatch[1];
          const direction = directions[rawDirection] || rawDirection;
          move(direction);
          saveGame();
          return;
        }

        if (processLocationAction(cmd)) {
          saveGame();
          return;
        }

        adjustScore(-10);
        printText('Command not recognized. Type HELP for valid options.');
        saveGame();
      }

      function handleMenuInput(cmd) {
        if (cmd === '1' || cmd === 'NORMAL' || cmd === 'NORMAL OP') {
          resetForNewRun(false);
          printText('TITAN: "Humanity test initializing... Contractor 7342, you\'re awake. Don\'t disappoint me."', 12, () => {
            game.state = 'PLAYING';
            updateStatusDisplay();
            processLook();
            saveGame();
            startIdleTimer();
          });
          return;
        }

        if (cmd === '2' || cmd === 'TRAINING' || cmd === 'TRAINING OP') {
          resetForNewRun(true);
          printText('TITAN: "Training protocol engaged. I will help. Reluctantly."', 12, () => {
            game.state = 'PLAYING';
            updateStatusDisplay();
            processLook();
            saveGame();
            startIdleTimer();
          });
          return;
        }

        if (cmd === 'R' || cmd === 'RESUME') {
          if (!loadGame()) {
            printText('No saved operation available.');
            return;
          }
          if (game.state === 'OFF' || game.state === 'DIFFICULTY_SELECT') game.state = 'PLAYING';
          updateStatusDisplay();
          printText('CACHE RESTORED.');
          processLook();
          saveGame();
          startIdleTimer();
          return;
        }

        if (cmd === 'N' || cmd === 'NEW GAME') {
          deleteSave();
          printText('Old save wiped. Choose a protocol.');
          return;
        }

        printText('INVALID CHOICE. ENTER 1, 2, R, OR N.');
      }

      function handleInput(rawCmd) {
        if (isTyping) return;

        const cmd = normalizeCommand(rawCmd);
        appendLine(`> ${cmd || '[ENTER]'}`, 'player');
        inputField.value = '';
        inputField.focus();
        startIdleTimer();

        if (game.state === 'OFF') {
          showBootMenu();
          return;
        }

        if (game.state === 'DIFFICULTY_SELECT') {
          handleMenuInput(cmd);
          return;
        }

        if (game.state === 'BOOT') {
          game.state = 'PLAYING';
          updateStatusDisplay();
          processCommand(cmd);
          return;
        }

        if (game.state === 'PLAYING') {
          processCommand(cmd);
          return;
        }

        if (game.state === 'VICTORY' || game.state === 'DEFEAT') {
          if (cmd === 'POWER' || cmd === 'RESTART' || cmd === 'NEW GAME') {
            game = createInitialGame();
            updateStatusDisplay();
            showBootMenu();
          } else {
            printText('Operation complete. Type POWER to begin a new run.');
          }
        }
      }

      function bootScreen() {
        appendLine('TITAN RELAY LINK // STANDBY', 'system');
        appendLine('Type anything or press POWER to initialize.', 'muted');
        updateStatusDisplay();
      }

      inputField.addEventListener('keydown', event => {
        if (event.key === 'Enter') handleInput(inputField.value);
      });

      powerBtn.addEventListener('click', () => handleInput('POWER'));
      clearBtn.addEventListener('click', () => {
        outputDiv.innerHTML = '';
        appendLine('DISPLAY CLEARED.', 'muted');
      });

      terminal.addEventListener('click', () => inputField.focus());
      window.addEventListener('beforeunload', saveGame);

      bootScreen();
      inputField.focus();
    })();
  </script>
</body>
</html>
