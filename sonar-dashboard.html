<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdvisorFlow - Call Tracker</title>
  <style>
    :root {
      --led-orange: #ff6b35;
      --led-red: #d94f4f;
      --led-bg: #1a1a2e;
      --panel-bg: #0f0f1a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --accent-blue: #4fc3f7;
      --accent-green: #66bb6a;
      --accent-yellow: #ffa726;
      --border-color: #2d2d44;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      background: linear-gradient(135deg, #0a0a12 0%, #1a1a2e 100%);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* === TICKER BAR === */
    .ticker-bar {
      display: flex;
      gap: 30px;
      background: #0d0d14;
      padding: 12px 30px;
      border-bottom: 2px solid var(--led-orange);
      overflow-x: auto;
      white-space: nowrap;
    }

    .ticker-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .ticker-label { color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }
    .ticker-value { font-weight: bold; color: var(--accent-green); }
    .ticker-value.negative { color: var(--led-red); }
    .ticker-trend { font-size: 10px; }

    /* === MAIN LAYOUT === */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 20px;
    }

    /* === TIMER SECTION === */
    .timer-section {
      background: var(--panel-bg);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .timer-display {
      font-family: 'Courier New', monospace;
      font-size: 120px;
      color: var(--led-orange);
      text-shadow: 0 0 20px rgba(255, 107, 53, 0.6), 0 0 40px rgba(255, 107, 53, 0.3);
      margin-bottom: 20px;
      letter-spacing: 8px;
    }

    .timer-controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-primary {
      background: var(--led-orange);
      color: #fff;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
    }

    .btn-secondary {
      background: var(--border-color);
      color: var(--text-primary);
    }

    .btn-danger {
      background: var(--led-red);
      color: #fff;
    }

    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* === CATEGORY SELECTOR === */
    .category-selector {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .cat-btn {
      padding: 8px 20px;
      border-radius: 6px;
      background: var(--border-color);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .cat-btn.active {
      background: var(--accent-blue);
      color: #fff;
    }

    /* === ANXIETY RATING === */
    .anxiety-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .anxiety-label { color: var(--text-secondary); font-size: 14px; }

    .rating-buttons {
      display: flex;
      gap: 8px;
    }

    .rating-btn {
      width: 45px;
      height: 45px;
      border-radius: 8px;
      background: var(--border-color);
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .rating-btn:hover { transform: scale(1.1); }
    .rating-btn.selected { background: var(--led-orange); color: #fff; box-shadow: 0 0 15px rgba(255, 107, 53, 0.6); }

    /* === INSIGHTS PANEL === */
    .insights-panel {
      background: linear-gradient(135deg, #1a1a3e 0%, #2d2d4f 100%);
      border-radius: 16px;
      padding: 25px;
      margin-top: 20px;
    }

    .insights-title {
      font-size: 18px;
      color: var(--accent-yellow);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .insight-content {
      line-height: 1.7;
      font-size: 15px;
      color: var(--text-primary);
    }

    .insight-highlight {
      background: rgba(255, 167, 38, 0.15);
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: bold;
      color: var(--accent-yellow);
    }

    /* === DAILY LOG === */
    .daily-log {
      background: var(--panel-bg);
      border-radius: 16px;
      padding: 25px;
      margin-top: 20px;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .log-title { font-size: 18px; color: var(--accent-blue); }

    .call-entry {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 12px;
      border-left: 4px solid var(--accent-blue);
    }

    .call-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .call-time { font-size: 13px; color: var(--text-secondary); }
    .call-meta { display: flex; gap: 15px; font-size: 12px; }
    .call-note { font-style: italic; color: var(--text-secondary); margin-top: 8px; font-size: 13px; }

    /* === ADD CATEGORY FORM === */
    .add-category-form {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--border-color);
    }

    .form-input {
      padding: 10px 15px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      font-size: 14px;
    }

    .form-input:focus { outline: none; border-color: var(--accent-blue); }

    /* === WEEKLY SUMMARY TOGGLE === */
    .toggle-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }

    .toggle-btn {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .toggle-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }

    /* === WEEKLY DATA (Initially Hidden) === */
    .weekly-data {
      display: none;
      margin-top: 15px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
    }

    .weekly-data.show { display: block; }

    .weekly-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 15px;
    }

    .day-card {
      text-align: center;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }

    .day-name { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
    .day-value { font-size: 24px; font-weight: bold; color: var(--accent-green); }
    .day-best { position: absolute; top: -8px; right: -8px; background: var(--led-orange); border-radius: 10px; padding: 2px 6px; font-size: 9px; }

    /* === MANUAL ENTRY FORM (Initially Hidden) === */
    .manual-entry-form {
      display: none;
      margin-top: 15px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
    }

    .manual-entry-form.show { display: block; }

    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; color: var(--text-secondary); font-size: 13px; margin-bottom: 5px; }
    .form-row input, .form-row select { width: 100%; padding: 10px; border-radius: 6px; background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border-color); color: var(--text-primary); }

    /* === NOTES SECTION === */
    .notes-section { margin-top: 15px; }
    .notes-input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      font-size: 14px;
      resize: vertical;
    }

    /* === RESET MODAL === */
    .reset-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .reset-modal.show { display: flex; }

    .modal-content {
      background: var(--panel-bg);
      border-radius: 16px;
      padding: 30px;
      max-width: 450px;
      text-align: center;
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .timer-display { font-size: 80px; letter-spacing: 4px; }
      .ticker-bar { gap: 15px; padding: 10px 20px; }
      .container { padding: 15px; }
    }
  </style>
</head>
<body>

<!-- TICKER BAR -->
<div class="ticker-bar" id="tickerBar">
  <div class="ticker-item"><span class="ticker-label">Calls Today</span><span class="ticker-value" id="callsToday">0</span></div>
  <div class="ticker-item"><span class="ticker-label">Time Spent</span><span class="ticker-value" id="timeSpent">0m</span></div>
  <div class="ticker-item"><span class="ticker-label">Prospects</span><span class="ticker-value" id="prospectsCount">0</span></div>
  <div class="ticker-item"><span class="ticker-label">$ Assets (Today)</span><span class="ticker-value" id="assetsReceived">$0</span></div>
  <div class="ticker-item"><span class="ticker-label">$ Pending</span><span class="ticker-value negative" id="assetsPending">$0</span></div>
  <div class="ticker-item"><span class="ticker-label">Streak</span><span class="ticker-value" id="streakCount">🔥0</span></div>
  <div class="ticker-item"><span class="ticker-label">Today vs Avg</span><span class="ticker-value" id="todayVsAvg">vs 0 calls</span><span class="ticker-trend" id="trendArrow"></span></div>
</div>

<div class="container">

<!-- TIMER SECTION -->
<div class="timer-section">
  <div class="timer-display" id="timerDisplay">00:00:00</div>
  
  <div class="category-selector" id="categorySelector"></div>
  
  <div class="anxiety-section">
    <span class="anxiety-label">Pre-Call Anxiety (1-5):</span>
    <div class="rating-buttons" id="preAnxietyButtons"></div>
  </div>

  <div style="margin-bottom: 20px;">
    <input type="text" class="form-input" id="notesInput" placeholder="Quick notes after call... (optional)" style="width: 100%; max-width: 400px; text-align: center;">
  </div>

  <div class="timer-controls">
    <button class="btn btn-primary" id="startBtn">START</button>
    <button class="btn btn-secondary" id="stopBtn" disabled>STOP</button>
    <button class="btn btn-danger" id="resetBtn">RESET</button>
  </div>

  <!-- Manual Entry Toggle -->
  <div style="margin-top: 15px;">
    <button class="toggle-btn" onclick="document.getElementById('manualEntryForm').classList.toggle('show')">➕ Log Time Manually</button>
    
    <!-- Manual Entry Form -->
    <div class="manual-entry-form" id="manualEntryForm">
      <h3 style="margin-bottom: 15px; color: var(--accent-blue);">Manual Time Entry</h3>
      
      <div class="form-row">
        <label>Duration (minutes)</label>
        <input type="number" id="manualMinutes" min="1" placeholder="e.g., 25">
      </div>

      <div class="form-row">
        <label>Category</label>
        <select id="manualCategory"></select>
      </div>

      <button class="btn btn-primary" onclick="addManualEntry()">Log Entry</button>
    </div>
  </div>
</div>

<!-- INSIGHTS PANEL -->
<div class="insights-panel">
  <div class="insights-title">💡 Mentor Insight</div>
  <div class="insight-content" id="insightContent"></div>
</div>

<!-- DAILY LOG -->
<div class="daily-log">
  <div class="log-header">
    <span class="log-title">Today's Calls</span>
    <button class="toggle-btn" onclick="document.getElementById('weeklyData').classList.toggle('show')">📅 View Weekly Summary</button>
  </div>

  <!-- Weekly Data -->
  <div class="weekly-data" id="weeklyData"></div>

  <!-- Call Entries Container -->
  <div id="callEntriesContainer"></div>

  <!-- Add Category Form -->
  <div class="add-category-form">
    <input type="text" class="form-input" id="newCategoryInput" placeholder="New category name..." style="flex: 1;">
    <button class="btn btn-secondary" onclick="addCategory()">Add</button>
    <button class="btn btn-danger" onclick="resetBenchmarks()" title="Reset all high scores">🔄 Reset High Scores</button>
  </div>
</div>

<!-- RESET MODAL -->
<div class="reset-modal" id="resetModal">
  <div class="modal-content">
    <h2 style="margin-bottom: 15px;">Reset Benchmarks?</h2>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">This will clear all high scores and averages. You can't undo this.</p>
    <div style="display: flex; gap: 15px; justify-content: center;">
      <button class="btn btn-primary" onclick="confirmReset()">Yes, Reset</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

</div>

<script>
/**
 * ADVISORFLOW - Call Tracking App
 * Built with: Vanilla JS + LocalStorage
 * Features: Timer, Categories, Anxiety Tracking, Insights, High Scores
 */

// === STATE MANAGEMENT ===
const appState = {
  categories: ['Phone Calls', 'Appts', 'Research', 'CE', 'Other'],
  activeCategory: 'Phone Calls',
  
  timer: {
    running: false,
    startTime: null,
    elapsedSeconds: 0,
    intervalId: null
  },

  currentCall: {
    preAnxiety: null,
    postEase: null,
    notes: '',
    prospectsLogged: 0,
    assetsPendingValue: 0,
    assetsReceivedValue: 0
  },

  dailyLogs: [],
  
  benchmarks: {
    bestDayCalls: 0,
    avgDailyCalls: 0,
    lastResetDate: null
  }
};

// === DOM ELEMENTS ===
const elements = {
  timerDisplay: document.getElementById('timerDisplay'),
  startBtn: document.getElementById('startBtn'),
  stopBtn: document.getElementById('stopBtn'),
  resetBtn: document.getElementById('resetBtn'),
  
  categorySelector: document.getElementById('categorySelector'),
  preAnxietyButtons: document.getElementById('preAnxietyButtons'),
  notesInput: document.getElementById('notesInput'),
  
  callEntriesContainer: document.getElementById('callEntriesContainer'),
  
  tickerBar: {
    callsToday: document.getElementById('callsToday'),
    timeSpent: document.getElementById('timeSpent'),
    prospectsCount: document.getElementById('prospectsCount'),
    assetsReceived: document.getElementById('assetsReceived'),
    assetsPending: document.getElementById('assetsPending'),
    streakCount: document.getElementById('streakCount'),
    todayVsAvg: document.getElementById('todayVsAvg'),
    trendArrow: document.getElementById('trendArrow')
  },

  insightContent: document.getElementById('insightContent'),
  
  manualEntryForm: {
    show: () => document.getElementById('manualEntryForm').classList.add('show'),
    hide: () => document.getElementById('manualEntryForm').classList.remove('show'),
    minutes: document.getElementById('manualMinutes'),
    category: document.getElementById('manualCategory')
  },

  weeklyData: document.getElementById('weeklyData'),
  resetModal: document.getElementById('resetModal')
};

// === INITIALIZATION ===
function init() {
  loadData();
  renderCategories();
  renderAnxietyButtons();
  renderCallEntries();
  updateTicker();
  generateInsight();
  
  // Event Listeners
  elements.startBtn.addEventListener('click', startTimer);
  elements.stopBtn.addEventListener('click', stopTimer);
  elements.resetBtn.addEventListener('click', resetTimer);
  
  document.getElementById('newCategoryInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') addCategory();
  });
}

// === LOCAL STORAGE ===
function loadData() {
  const saved = localStorage.getItem('advisorflow_data');
  if (saved) {
    const parsed = JSON.parse(saved);
    appState.categories = parsed.categories || appState.categories;
    appState.activeCategory = parsed.activeCategory || appState.activeCategory;
    appState.dailyLogs = parsed.dailyLogs || [];
    appState.benchmarks = parsed.benchmarks || appState.benchmarks;
  }
}

function saveData() {
  const data = {
    categories: appState.categories,
    activeCategory: appState.activeCategory,
    dailyLogs: appState.dailyLogs,
    benchmarks: appState.benchmarks
  };
  localStorage.setItem('advisorflow_data', JSON.stringify(data));
}

// === TIMER FUNCTIONS ===
function startTimer() {
  if (appState.timer.running) return;
  
  appState.timer.running = true;
  appState.timer.startTime = Date.now();
  
  elements.startBtn.disabled = true;
  elements.stopBtn.disabled = false;
  elements.resetBtn.disabled = true;
  
  updateTickerDisplay(); // Show "In Progress" state
  
  appState.timer.intervalId = setInterval(() => {
    const elapsed = Math.floor((Date.now() - (appState.timer.startTime || Date.now())) / 1000);
    appState.timer.elapsedSeconds += 1;
    formatTimerDisplay(elapsed + appState.timer.elapsedSeconds);
    updateTickerDisplay();
  }, 1000);

  playClickSound('start');
}

function stopTimer() {
  if (!appState.timer.running) return;
  
  clearInterval(appState.timer.intervalId);
  appState.timer.running = false;
  
  // Save call entry
  saveCallEntry();
  
  elements.startBtn.disabled = false;
  elements.stopBtn.disabled = true;
  elements.resetBtn.disabled = false;
  
  playClickSound('stop');
}

function resetTimer() {
  clearInterval(appState.timer.intervalId);
  appState.timer.running = false;
  appState.timer.elapsedSeconds = 0;
  appState.currentCall.preAnxiety = null;
  
  formatTimerDisplay(0);
  updateTicker();
  
  elements.startBtn.disabled = false;
  elements.stopBtn.disabled = true;
  elements.resetBtn.disabled = false;
  
  playClickSound('reset');
}

function formatTimerDisplay(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;
  
  elements.timerDisplay.textContent = 
    `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

function updateTickerDisplay() {
  const totalSeconds = appState.timer.elapsedSeconds;
  elements.tickerBar.timeSpent.textContent = formatTime(totalSeconds);
}

// === CALL ENTRY FUNCTIONS ===
function saveCallEntry() {
  if (appState.timer.elapsedSeconds <= 0) return;
  
  const today = new Date().toISOString().split('T')[0];
  
  const callEntry = {
    id: Date.now(),
    date: today,
    startTime: appState.currentCall.startTime || null,
    durationMinutes: Math.round(appState.timer.elapsedSeconds / 60),
    category: appState.activeCategory,
    preAnxiety: appState.currentCall.preAnxiety,
    postEase: appState.postEase, // This should be set before stopping!
    notes: elements.notesInput.value,
    prospectsLogged: appState.currentCall.prospectsLogged,
    assetsPendingValue: appState.currentCall.assetsPendingValue,
    assetsReceivedValue: appState.currentCall.assetsReceivedValue
  };
  
  appState.dailyLogs.unshift(callEntry);
  saveData();
  renderCallEntries();
  updateTicker();
  generateInsight();
}

function addManualEntry() {
  const minutes = parseInt(elements.manualEntryForm.minutes.value);
  if (!minutes || minutes < 1) {
    alert('Please enter a valid duration');
    return;
  }
  
  const category = elements.manualEntryForm.category.value;
  
  const callEntry = {
    id: Date.now(),
    date: new Date().toISOString().split('T')[0],
    startTime: null,
    durationMinutes: minutes,
    category: category,
    preAnxiety: 3, // Default for manual entry
    postEase: 3,
    notes: '',
    prospectsLogged: 0,
    assetsPendingValue: 0,
    assetsReceivedValue: 0
  };
  
  appState.dailyLogs.unshift(callEntry);
  saveData();
  renderCallEntries();
  updateTicker();
  
  elements.manualEntryForm.hide();
}

function addCategory() {
  const input = document.getElementById('newCategoryInput');
  const name = input.value.trim();
  
  if (!name || appState.categories.includes(name)) return;
  
  appState.categories.push(name);
  appState.activeCategory = name;
  saveData();
  renderCategories();
  updateTicker();
  
  input.value = '';
}

function removeCategory(category) {
  if (appState.categories.length <= 1) {
    alert('You need at least one category');
    return;
  }
  
  if (!confirm(`Delete "${category}"? This will not delete past entries using this category.`)) return;
  
  appState.categories = appState.categories.filter(c => c !== category);
  saveData();
  renderCategories();
}

// === RENDER FUNCTIONS ===
function renderCategories() {
  elements.categorySelector.innerHTML = '';
  
  appState.categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = `cat-btn ${appState.activeCategory === cat ? 'active' : ''}`;
    btn.textContent = cat;
    btn.onclick = () => selectCategory(cat);
    
    if (cat !== appState.categories[0]) { // Keep at least one
      const deleteBtn = document.createElement('span');
      deleteBtn.innerHTML = '&times;';
      deleteBtn.style.cssText = 'margin-left: 8px; cursor: pointer; color: var(--led-red);';
      deleteBtn.onclick = (e) => { e.stopPropagation(); removeCategory(cat); };
      btn.appendChild(deleteBtn);
    }
    
    elements.categorySelector.appendChild(btn);
  });
  
  // Also populate manual entry dropdown
  elements.manualEntryForm.category.innerHTML = appState.categories.map(c => 
    `<option value="${c}">${c}</option>`
  ).join('');
}

function selectCategory(category) {
  appState.activeCategory = category;
  saveData();
  renderCategories();
}

function renderAnxietyButtons() {
  elements.preAnxietyButtons.innerHTML = '';
  
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement('button');
    btn.className = `rating-btn ${appState.currentCall.preAnxiety === i ? 'selected' : ''}`;
    btn.textContent = i;
    btn.onclick = () => selectPreAnxiety(i);
    elements.preAnxietyButtons.appendChild(btn);
  }
}

function selectPreAnxiety(value) {
  appState.currentCall.preAnxiety = value;
  renderAnxietyButtons();
}

function renderCallEntries() {
  const today = new Date().toISOString().split('T')[0];
  const todaysCalls = appState.dailyLogs.filter(log => log.date === today);
  
  elements.callEntriesContainer.innerHTML = '';
  
  if (todaysCalls.length === 0) {
    elements.callEntriesContainer.innerHTML = `
      <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
        No calls logged today. Start the timer to log your first one!
      </div>
    `;
    return;
  }
  
  todaysCalls.forEach(call => {
    const entry = document.createElement('div');
    entry.className = 'call-entry';
    
    let anxietyDisplay = call.preAnxiety ? 
      `<span class="call-meta">📊 Pre-Anxiety: ${call.preAnxiety}/5</span>` : '';
    
    let postEaseDisplay = call.postEase ? 
      `<span class="call-meta">😊 Post-Ease: ${call.postEase}/5</span>` : '';
    
    entry.innerHTML = `
      <div class="call-header">
        <div>
          <strong>${call.category}</strong>
          <div class="call-time">${formatTime(call.durationMinutes * 60)} • ${new Date().toLocaleTimeString()}</div>
        </div>
        <div style="text-align: right;">
          <span class="ticker-value">$${call.assetsReceivedValue.toLocaleString()}</span>
        </div>
      </div>
      <div class="call-meta" style="margin-bottom: 5px;">
        ${anxietyDisplay}
        ${postEaseDisplay}
      </div>
      ${call.prospectsLogged > 0 ? `<div class="call-meta">📈 ${call.prospectsLogged} prospect(s)</div>` : ''}
      ${call.notes ? `<div class="call-note">"${call.notes}"</div>` : ''}
    `;
    
    elements.callEntriesContainer.appendChild(entry);
  });
  
  // Weekly Summary
  renderWeeklyData();
}

function renderWeeklyData() {
  const sevenDaysAgo = new Date();
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 6);
  
  const weekLogs = appState.dailyLogs.filter(log => 
    new Date(log.date) >= sevenDaysAgo
  );
  
  const weekData = {};
  for (let i = 0; i < 7; i++) {
    const date = new Date();
    date.setDate(date.getDate() - (6 - i));
    const dateStr = date.toISOString().split('T')[0];
    
    weekData[dateStr] = {
      name: date.toLocaleDateString('en-US', { weekday: 'short' }),
      calls: 0,
      time: 0,
      revenue: 0
    };
    
    const dayLogs = weekLogs.filter(log => log.date === dateStr);
    weekData[dateStr].calls = dayLogs.length;
    weekData[dateStr].time = dayLogs.reduce((sum, l) => sum + l.durationMinutes, 0);
    weekData[dateStr].revenue = dayLogs.reduce((sum, l) => sum + (l.assetsReceivedValue || 0), 0);
  }
  
  elements.weeklyData.innerHTML = `
    <div class="weekly-grid">
      ${Object.values(weekData).map(day => {
        const isBest = day.calls === appState.benchmarks.bestDayCalls && day.calls > 0;
        return `
          <div style="position: relative;">
            ${isBest ? '<span class="day-best">🏆 Best</span>' : ''}
            <div class="day-name">${day.name}</div>
            <div class="day-value">${day.calls}</div>
            <small>${formatTime(day.time * 60)}</small>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// === TICKER UPDATE ===
function updateTicker() {
  const today = new Date().toISOString().split('T')[0];
  const todaysCalls = appState.dailyLogs.filter(log => log.date === today);
  
  const totalCalls = todaysCalls.length;
  const totalTime = todaysCalls.reduce((sum, l) => sum + l.durationMinutes, 0);
  const prospectsCount = todaysCalls.reduce((sum, l) => sum + (l.prospectsLogged || 0), 0);
  const assetsReceived = todaysCalls.reduce((sum, l) => sum + (l.assetsReceivedValue || 0), 0);
  const assetsPending = todaysCalls.reduce((sum, l) => sum + (l.assetsPendingValue || 0), 0);
  
  // Streak calculation (consecutive days with at least 1 call)
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const checkDate = new Date();
    checkDate.setDate(checkDate.getDate() - i);
    const dateStr = checkDate.toISOString().split('T')[0];
    
    if (appState.dailyLogs.some(log => log.date === dateStr)) {
      streak++;
    } else if (i > 0) {
      break;
    }
  }
  
  // Average vs Today comparison
  const allCalls = appState.dailyLogs;
  const avgDaily = allCalls.length / Math.max(1, new Set(allCalls.map(l => l.date)).size);
  const trendUp = totalCalls >= avgDaily;
  
  elements.tickerBar.callsToday.textContent = `${totalCalls}`;
  elements.tickerBar.timeSpent.textContent = formatTime(totalTime * 60);
  elements.tickerBar.prospectsCount.textContent = prospectsCount;
  elements.tickerBar.assetsReceived.textContent = `$${assetsReceived.toLocaleString()}`;
  elements.tickerBar.assetsPending.textContent = `$${assetsPending.toLocaleString()}`;
  elements.tickerBar.streakCount.textContent = `🔥${streak}`;
  
  if (allCalls.length > 0) {
    const diff = totalCalls - avgDaily;
    const sign = diff >= 0 ? '+' : '';
    elements.tickerBar.todayVsAvg.textContent = `${totalCalls} / ${avgDaily.toFixed(1)} avg`;
    
    if (trendUp && diff > 0) {
      elements.tickerBar.trendArrow.innerHTML = '⬆️';
    } else if (!trendUp && diff < 0) {
      elements.tickerBar.trendArrow.innerHTML = '⬇️';
    } else {
      elements.tickerBar.trendArrow.innerHTML = '➡️';
    }
  } else {
    elements.tickerBar.todayVsAvg.textContent = 'vs 0 calls';
    elements.tickerBar.trendArrow.innerHTML = '';
  }
}

// === INSIGHTS GENERATION (Science-Based) ===
function generateInsight() {
  const insights = [
    // Mind Lie Detection (Cognitive Behavioral Science - Beck, 1976)
    () => {
      if (!appState.dailyLogs.length) return null;
      
      const callsWithAnxiety = appState.dailyLogs.filter(l => l.preAnxiety && l.postEase);
      if (callsWithAnxiety.length < 3) return null;
      
      const avgPreAnxiety = callsWithAnxiety.reduce((sum, c) => sum + c.preAnxiety, 0) / callsWithAnxiety.length;
      const avgPostEase = callsWithAnxiety.reduce((sum, c) => sum + c.postEase, 0) / callsWithAnxiety.length;
      
      if (avgPreAnxiety > avgPostEase + 1.5) {
        return `Mind Lie Detected! 🧠 Your brain estimated an average anxiety of <span class="insight-highlight">${avgPreAnxiety.toFixed(1)}</span> before calls, but reality was only <span class="insight-highlight">${avgPostEase.toFixed(1)}</span>. This gap shows your anticipation is worse than the actual experience—a pattern psychologists call "affective forecasting bias." Each time you act despite anxiety, you're rewiring that prediction loop.`;
      }
      return null;
    },
    
    // Warm-Up Effect (Performance Psychology)
    () => {
      if (!appState.dailyLogs.length) return null;
      
      const today = new Date().toISOString().split('T')[0];
      const todaysCalls = appState.dailyLogs.filter(l => l.date === today && l.preAnxiety);
      
      if (todaysCalls.length < 2) return null;
      
      const firstCall = todaysCalls[0].preAnxiety;
      const lastCall = todaysCalls[todaysCalls.length - 1].preAnxiety;
      
      if (firstCall > lastCall + 1) {
        return `Warm-Up Effect in Action! 🔥 Your first call today averaged <span class="insight-highlight">${firstCall}</span> anxiety, but by the end you're down to <span class="insight-highlight">${lastCall}</span>. This mirrors the "warm-up effect" in athletic performance—your brain builds momentum with each action. Consider scheduling your hardest calls after 3-4 warm-ups.`;
      }
      return null;
    },
    
    // Streak Motivation (Behavioral Economics - Loss Aversion)
    () => {
      let streak = 0;
      for (let i = 0; i < 365; i++) {
        const checkDate = new Date();
        checkDate.setDate(checkDate.getDate() - i);
        const dateStr = checkDate.toISOString().split('T')[0];
        
        if (appState.dailyLogs.some(log => log.date === dateStr)) {
          streak++;
        } else if (i > 0) {
          break;
        }
      }
      
      if (streak >= 5 && streak < 10) {
        return `Streak Alert! 🔥 You've logged activity ${streak} day(s) in a row. Behavioral economics shows humans are motivated by "loss aversion"—the pain of breaking a streak feels worse than the joy of starting a new one. Protect this momentum.`;
      } else if (streak >= 10) {
        return `Incredible Momentum! 🚀 ${streak} days strong! Research on habit formation shows that after ~66 days, behavior shifts from "willpower-dependent" to "identity-based." You're building an identity as someone who shows up.`;
      }
      return null;
    },
    
    // Revenue Per Hour (Economic Perspective)
    () => {
      if (!appState.dailyLogs.length) return null;
      
      const today = new Date().toISOString().split('T')[0];
      const todaysCalls = appState.dailyLogs.filter(l => l.date === today);
      
      const totalRevenue = todaysCalls.reduce((sum, l) => sum + (l.assetsReceivedValue || 0), 0);
      const totalTime = todaysCalls.reduce((sum, l) => sum + l.durationMinutes, 0);
      
      if (totalTime > 0 && totalRevenue > 0) {
        const revenuePerHour = (totalRevenue / totalTime) * 60;
        
        // Get historical average for comparison
        const allCalls = appState.dailyLogs;
        let histTotalRev = 0, histTotalMin = 0;
        for (const call of allCalls) {
          histTotalRev += call.assetsReceivedValue || 0;
          histTotalMin += call.durationMinutes;
        }
        
        const avgRevenuePerHour = histTotalMin > 0 ? (histTotalRev / histTotalMin) * 60 : 0;
        
        if (revenuePerHour > avgRevenuePerHour * 1.2) {
          return `Efficiency Champion! 💰 You're earning <span class="insight-highlight">$${revenuePerHour.toFixed(0)}</span>/hour today, above your average of <span class="insight-highlight">$${avgRevenuePerHour.toFixed(0)}</span>. This suggests you've found a rhythm—protect these hours.`;
        } else if (revenuePerHour > 1000) {
          return `Strong Value Creation! 💎 <span class="insight-highlight">$${totalRevenue.toLocaleString()}</span> in assets today from ${todaysCalls.length} calls. That's the kind of impact that matters—keep showing up.`;
        }
      }
      return null;
    },
    
    // Default Uplifting Message
    () => {
      const today = new Date().toISOString().split('T')[0];
      const todaysCalls = appState.dailyLogs.filter(l => l.date === today).length;
      
      if (todaysCalls > 0) {
        return `You've made <span class="insight-highlight">${todaysCalls} call(s)</span> today. Every action you take compounds—research shows that small, consistent behaviors create significant long-term results. You're building momentum.`;
      }
      
      if (appState.dailyLogs.length > 0) {
        return `You've logged <span class="insight-highlight">${appState.dailyLogs.length} call(s)</span> total! This data is your compass—each entry helps you see patterns and make better decisions. Keep tracking.`;
      }
      
      return `Ready to build momentum? Starting just one call changes the equation from "avoidance" to action. The hardest part is always beginning.`;
    }
  ];
  
  for (const insightFn of insights) {
    const result = insightFn();
    if (result) {
      elements.insightContent.innerHTML = result;
      return;
    }
  }
}

// === UTILITY FUNCTIONS ===
function formatTime(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  
  if (h > 0) {
    return `${h}h ${m}m`;
  }
  return `${m}m ${Math.round(totalSeconds % 60)}s`;
}

function playClickSound(type = 'click') {
  // Web Audio API for synthesized click sounds (no external files needed)
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  
  if (type === 'click') {
    oscillator.frequency.value = 800;
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    oscillator.start(audioCtx.currentTime);
    oscillator.stop(audioCtx.currentTime + 0.1);
  } else if (type === 'start') {
    oscillator.frequency.value = 600;
    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    oscillator.start(audioCtx.currentTime);
    oscillator.stop(audioCtx.currentTime + 0.15);
  } else if (type === 'stop') {
    oscillator.frequency.value = 400;
    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    oscillator.start(audioCtx.currentTime);
    oscillator.stop(audioCtx.currentTime + 0.2);
  } else if (type === 'reset') {
    oscillator.frequency.value = 300;
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
    oscillator.start(audioCtx.currentTime);
    oscillator.stop(audioCtx.currentTime + 0.25);
  }
}

// === BENCHMARK RESET ===
function resetBenchmarks() {
  elements.resetModal.classList.add('show');
}

function confirmReset() {
  appState.benchmarks = { bestDayCalls: 0, avgDailyCalls: 0, lastResetDate: new Date().toISOString().split('T')[0] };
  saveData();
  closeModal();
  updateTicker();
}

function closeModal() {
  elements.resetModal.classList.remove('show');
}
