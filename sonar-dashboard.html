<script>
/**
 * ADVISORFLOW - Call Tracking App
 * Improved version:
 * - Fixes timer double-count bug
 * - Adds post-call ease tracking
 * - Adds prospects / assets inputs
 * - Makes benchmarks actually work
 * - Persists active timer across refresh
 * - Fixes entry timestamps
 * - Adds category rename (true CRUD)
 */

const STORAGE_KEY = 'advisorflow_data_v2';

const appState = {
  categories: ['Phone Calls', 'Appts', 'Research', 'CE', 'Other'],
  activeCategory: 'Phone Calls',

  timer: {
    running: false,
    startedAt: null,
    elapsedSeconds: 0,
    intervalId: null
  },

  currentCall: {
    startedAt: null,
    preAnxiety: null,
    postEase: null,
    notes: '',
    prospectsLogged: 0,
    assetsPendingValue: 0,
    assetsReceivedValue: 0
  },

  dailyLogs: [],

  benchmarks: {
    bestDayCalls: 0,
    avgDailyCalls: 0,
    lastResetDate: null
  }
};

const currencyFormatter = new Intl.NumberFormat('en-US', {
  style: 'currency',
  currency: 'USD',
  maximumFractionDigits: 0
});

let audioCtx = null;

const elements = {
  timerDisplay: document.getElementById('timerDisplay'),
  startBtn: document.getElementById('startBtn'),
  stopBtn: document.getElementById('stopBtn'),
  resetBtn: document.getElementById('resetBtn'),

  categorySelector: document.getElementById('categorySelector'),
  preAnxietyButtons: document.getElementById('preAnxietyButtons'),
  postEaseButtons: document.getElementById('postEaseButtons'),
  notesInput: document.getElementById('notesInput'),
  prospectsInput: document.getElementById('prospectsInput'),
  assetsPendingInput: document.getElementById('assetsPendingInput'),
  assetsReceivedInput: document.getElementById('assetsReceivedInput'),

  callEntriesContainer: document.getElementById('callEntriesContainer'),

  tickerBar: {
    callsToday: document.getElementById('callsToday'),
    timeSpent: document.getElementById('timeSpent'),
    prospectsCount: document.getElementById('prospectsCount'),
    assetsReceived: document.getElementById('assetsReceived'),
    assetsPending: document.getElementById('assetsPending'),
    streakCount: document.getElementById('streakCount'),
    todayVsAvg: document.getElementById('todayVsAvg'),
    trendArrow: document.getElementById('trendArrow')
  },

  insightContent: document.getElementById('insightContent'),

  manualEntryForm: {
    root: document.getElementById('manualEntryForm'),
    minutes: document.getElementById('manualMinutes'),
    category: document.getElementById('manualCategory'),
    prospects: document.getElementById('manualProspects'),
    assetsPending: document.getElementById('manualAssetsPending'),
    assetsReceived: document.getElementById('manualAssetsReceived'),
    notes: document.getElementById('manualNotes')
  },

  weeklyData: document.getElementById('weeklyData'),
  resetModal: document.getElementById('resetModal')
};

// ---------- INIT ----------
function init() {
  loadData();
  bindEvents();
  hydrateInputsFromState();
  renderCategories();
  renderAnxietyButtons();
  updateBenchmarks();
  renderCallEntries();
  updateTicker();
  generateInsight();
  restoreTimerIfNeeded();
}

function bindEvents() {
  elements.startBtn.addEventListener('click', startTimer);
  elements.stopBtn.addEventListener('click', stopTimer);
  elements.resetBtn.addEventListener('click', resetTimer);

  document.getElementById('newCategoryInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') addCategory();
  });

  const sessionInputs = [
    elements.notesInput,
    elements.prospectsInput,
    elements.assetsPendingInput,
    elements.assetsReceivedInput
  ].filter(Boolean);

  sessionInputs.forEach(input => {
    input.addEventListener('input', syncCurrentCallFromInputs);
  });

  window.addEventListener('beforeunload', saveData);
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) saveData();
  });
}

// ---------- STORAGE ----------
function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('advisorflow_data');
  if (!raw) return;

  try {
    const parsed = JSON.parse(raw);

    if (Array.isArray(parsed.categories) && parsed.categories.length) {
      appState.categories = parsed.categories.map(v => String(v).trim()).filter(Boolean);
    }

    if (typeof parsed.activeCategory === 'string' && parsed.activeCategory.trim()) {
      appState.activeCategory = parsed.activeCategory;
    }

    if (Array.isArray(parsed.dailyLogs)) {
      appState.dailyLogs = parsed.dailyLogs.map(normalizeLog).filter(Boolean);
    }

    if (parsed.benchmarks && typeof parsed.benchmarks === 'object') {
      appState.benchmarks = {
        bestDayCalls: toInt(parsed.benchmarks.bestDayCalls),
        avgDailyCalls: toNumber(parsed.benchmarks.avgDailyCalls),
        lastResetDate: parsed.benchmarks.lastResetDate || null
      };
    }

    if (parsed.timer && typeof parsed.timer === 'object') {
      appState.timer.running = !!parsed.timer.running;
      appState.timer.startedAt = parsed.timer.startedAt || null;
      appState.timer.elapsedSeconds = toInt(parsed.timer.elapsedSeconds);
    }

    if (parsed.currentCall && typeof parsed.currentCall === 'object') {
      appState.currentCall = {
        startedAt: parsed.currentCall.startedAt || null,
        preAnxiety: normalizeRating(parsed.currentCall.preAnxiety),
        postEase: normalizeRating(parsed.currentCall.postEase),
        notes: String(parsed.currentCall.notes || ''),
        prospectsLogged: toInt(parsed.currentCall.prospectsLogged),
        assetsPendingValue: toNumber(parsed.currentCall.assetsPendingValue),
        assetsReceivedValue: toNumber(parsed.currentCall.assetsReceivedValue)
      };
    }
  } catch (err) {
    console.warn('Could not load saved AdvisorFlow data:', err);
  }
}

function saveData() {
  const snapshot = {
    categories: appState.categories,
    activeCategory: appState.activeCategory,
    dailyLogs: appState.dailyLogs,
    benchmarks: appState.benchmarks,
    timer: {
      running: appState.timer.running,
      startedAt: appState.timer.startedAt,
      elapsedSeconds: appState.timer.elapsedSeconds
    },
    currentCall: {
      ...appState.currentCall
    }
  };

  localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
}

// ---------- HELPERS ----------
function getLocalDateString(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function toNumber(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : 0;
}

function toInt(value) {
  return Math.max(0, Math.round(toNumber(value)));
}

function normalizeRating(value) {
  const n = toInt(value);
  return n >= 1 && n <= 5 ? n : null;
}

function normalizeLog(log) {
  if (!log || typeof log !== 'object') return null;

  const durationSeconds =
    toInt(log.durationSeconds) ||
    toInt(log.durationMinutes) * 60;

  return {
    id: log.id || Date.now() + Math.random(),
    date: log.date || getLocalDateString(),
    startedAt: log.startedAt || null,
    endedAt: log.endedAt || null,
    durationSeconds,
    category: String(log.category || 'Phone Calls'),
    preAnxiety: normalizeRating(log.preAnxiety),
    postEase: normalizeRating(log.postEase),
    notes: String(log.notes || ''),
    prospectsLogged: toInt(log.prospectsLogged),
    assetsPendingValue: toNumber(log.assetsPendingValue),
    assetsReceivedValue: toNumber(log.assetsReceivedValue)
  };
}

function getDurationSeconds(log) {
  return toInt(log.durationSeconds) || (toInt(log.durationMinutes) * 60);
}

function getTodayLogs() {
  const today = getLocalDateString();
  return appState.dailyLogs.filter(log => log.date === today);
}

function sortLogsAscending(logs) {
  return [...logs].sort((a, b) => {
    const aTime = a.startedAt || a.id || 0;
    const bTime = b.startedAt || b.id || 0;
    return aTime - bTime;
  });
}

function sortLogsDescending(logs) {
  return [...logs].sort((a, b) => {
    const aTime = a.startedAt || a.id || 0;
    const bTime = b.startedAt || b.id || 0;
    return bTime - aTime;
  });
}

// ---------- TIMER ----------
function restoreTimerIfNeeded() {
  if (!appState.timer.running || !appState.timer.startedAt) {
    formatTimerDisplay(appState.timer.elapsedSeconds || 0);
    setTimerButtonState(false);
    return;
  }

  appState.currentCall.startedAt = appState.currentCall.startedAt || appState.timer.startedAt;
  setTimerButtonState(true);
  tickTimer();
  appState.timer.intervalId = setInterval(tickTimer, 1000);
}

function tickTimer() {
  if (!appState.timer.running || !appState.timer.startedAt) return;

  appState.timer.elapsedSeconds = Math.max(
    0,
    Math.floor((Date.now() - appState.timer.startedAt) / 1000)
  );

  formatTimerDisplay(appState.timer.elapsedSeconds);
  updateTicker();
}

function startTimer() {
  if (appState.timer.running) return;

  syncCurrentCallFromInputs();

  const now = Date.now();
  appState.timer.running = true;
  appState.timer.startedAt = now;
  appState.timer.elapsedSeconds = 0;

  appState.currentCall.startedAt = now;

  setTimerButtonState(true);
  formatTimerDisplay(0);
  saveData();

  tickTimer();
  appState.timer.intervalId = setInterval(tickTimer, 1000);
  playClickSound('start');
}

function stopTimer() {
  if (!appState.timer.running) return;

  tickTimer();
  clearInterval(appState.timer.intervalId);
  appState.timer.intervalId = null;
  appState.timer.running = false;

  syncCurrentCallFromInputs();

  if (appState.timer.elapsedSeconds > 0) {
    saveCallEntry();
  }

  clearLiveSession();
  setTimerButtonState(false);
  formatTimerDisplay(0);
  updateTicker();
  renderCallEntries();
  generateInsight();
  saveData();
  playClickSound('stop');
}

function resetTimer() {
  clearInterval(appState.timer.intervalId);
  appState.timer.intervalId = null;

  appState.timer.running = false;
  appState.timer.startedAt = null;
  appState.timer.elapsedSeconds = 0;

  clearLiveSession();
  setTimerButtonState(false);
  formatTimerDisplay(0);
  updateTicker();
  generateInsight();
  saveData();
  playClickSound('reset');
}

function setTimerButtonState(isRunning) {
  elements.startBtn.disabled = isRunning;
  elements.stopBtn.disabled = !isRunning;
  elements.resetBtn.disabled = isRunning;
}

function formatTimerDisplay(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;

  elements.timerDisplay.textContent =
    `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

// ---------- LIVE SESSION ----------
function hydrateInputsFromState() {
  if (elements.notesInput) elements.notesInput.value = appState.currentCall.notes || '';
  if (elements.prospectsInput) elements.prospectsInput.value = appState.currentCall.prospectsLogged || '';
  if (elements.assetsPendingInput) elements.assetsPendingInput.value = appState.currentCall.assetsPendingValue || '';
  if (elements.assetsReceivedInput) elements.assetsReceivedInput.value = appState.currentCall.assetsReceivedValue || '';
}

function syncCurrentCallFromInputs() {
  appState.currentCall.notes = elements.notesInput?.value?.trim() || '';
  appState.currentCall.prospectsLogged = toInt(elements.prospectsInput?.value);
  appState.currentCall.assetsPendingValue = toNumber(elements.assetsPendingInput?.value);
  appState.currentCall.assetsReceivedValue = toNumber(elements.assetsReceivedInput?.value);
}

function clearLiveSession() {
  appState.timer.startedAt = null;
  appState.timer.elapsedSeconds = 0;

  appState.currentCall = {
    startedAt: null,
    preAnxiety: null,
    postEase: null,
    notes: '',
    prospectsLogged: 0,
    assetsPendingValue: 0,
    assetsReceivedValue: 0
  };

  if (elements.notesInput) elements.notesInput.value = '';
  if (elements.prospectsInput) elements.prospectsInput.value = '';
  if (elements.assetsPendingInput) elements.assetsPendingInput.value = '';
  if (elements.assetsReceivedInput) elements.assetsReceivedInput.value = '';

  renderAnxietyButtons();
}

// ---------- ENTRY SAVE ----------
function saveCallEntry() {
  const startedAt = appState.currentCall.startedAt || appState.timer.startedAt || Date.now();
  const endedAt = Date.now();
  const date = getLocalDateString(new Date(startedAt));

  const entry = {
    id: Date.now(),
    date,
    startedAt,
    endedAt,
    durationSeconds: appState.timer.elapsedSeconds,
    category: appState.activeCategory,
    preAnxiety: appState.currentCall.preAnxiety,
    postEase: appState.currentCall.postEase,
    notes: appState.currentCall.notes,
    prospectsLogged: appState.currentCall.prospectsLogged,
    assetsPendingValue: appState.currentCall.assetsPendingValue,
    assetsReceivedValue: appState.currentCall.assetsReceivedValue
  };

  appState.dailyLogs.unshift(entry);
  updateBenchmarks();
}

function addManualEntry() {
  const minutes = toInt(elements.manualEntryForm.minutes?.value);
  if (!minutes || minutes < 1) {
    alert('Please enter a valid duration.');
    return;
  }

  const category = elements.manualEntryForm.category?.value || appState.activeCategory;
  const prospectsLogged = toInt(elements.manualEntryForm.prospects?.value);
  const assetsPendingValue = toNumber(elements.manualEntryForm.assetsPending?.value);
  const assetsReceivedValue = toNumber(elements.manualEntryForm.assetsReceived?.value);
  const notes = elements.manualEntryForm.notes?.value?.trim() || '';

  const entry = {
    id: Date.now(),
    date: getLocalDateString(),
    startedAt: null,
    endedAt: null,
    durationSeconds: minutes * 60,
    category,
    preAnxiety: null,
    postEase: null,
    notes,
    prospectsLogged,
    assetsPendingValue,
    assetsReceivedValue
  };

  appState.dailyLogs.unshift(entry);
  updateBenchmarks();
  renderCallEntries();
  updateTicker();
  generateInsight();
  saveData();

  elements.manualEntryForm.minutes.value = '';
  if (elements.manualEntryForm.prospects) elements.manualEntryForm.prospects.value = 0;
  if (elements.manualEntryForm.assetsPending) elements.manualEntryForm.assetsPending.value = 0;
  if (elements.manualEntryForm.assetsReceived) elements.manualEntryForm.assetsReceived.value = 0;
  if (elements.manualEntryForm.notes) elements.manualEntryForm.notes.value = '';

  elements.manualEntryForm.root.classList.remove('show');
}

// ---------- CATEGORIES (CRUD) ----------
function addCategory() {
  const input = document.getElementById('newCategoryInput');
  const raw = input.value.trim();
  if (!raw) return;

  const exists = appState.categories.some(c => c.toLowerCase() === raw.toLowerCase());
  if (exists) {
    alert('That category already exists.');
    return;
  }

  appState.categories.push(raw);
  appState.activeCategory = raw;
  input.value = '';

  saveData();
  renderCategories();
}

function renameCategory(oldName) {
  const raw = prompt('Rename category:', oldName);
  if (!raw) return;

  const newName = raw.trim();
  if (!newName) return;

  const duplicate = appState.categories.some(
    c => c.toLowerCase() === newName.toLowerCase() && c !== oldName
  );
  if (duplicate) {
    alert('That category name already exists.');
    return;
  }

  appState.categories = appState.categories.map(c => c === oldName ? newName : c);
  appState.dailyLogs = appState.dailyLogs.map(log =>
    log.category === oldName ? { ...log, category: newName } : log
  );

  if (appState.activeCategory === oldName) {
    appState.activeCategory = newName;
  }

  saveData();
  renderCategories();
  renderCallEntries();
}

function removeCategory(category) {
  if (appState.categories.length <= 1) {
    alert('You need at least one category.');
    return;
  }

  const ok = confirm(`Delete "${category}"?\n\nPast entries will stay in your history.`);
  if (!ok) return;

  appState.categories = appState.categories.filter(c => c !== category);

  if (appState.activeCategory === category) {
    appState.activeCategory = appState.categories[0];
  }

  saveData();
  renderCategories();
}

function selectCategory(category) {
  appState.activeCategory = category;
  saveData();
  renderCategories();
}

function renderCategories() {
  elements.categorySelector.innerHTML = '';

  appState.categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = `cat-btn ${appState.activeCategory === cat ? 'active' : ''}`;
    btn.type = 'button';
    btn.style.display = 'inline-flex';
    btn.style.alignItems = 'center';
    btn.style.gap = '8px';

    const label = document.createElement('span');
    label.textContent = cat;
    btn.appendChild(label);

    const tools = document.createElement('span');
    tools.style.display = 'inline-flex';
    tools.style.gap = '6px';
    tools.style.marginLeft = '4px';

    const edit = document.createElement('span');
    edit.textContent = '✎';
    edit.title = 'Rename category';
    edit.style.cursor = 'pointer';
    edit.style.opacity = '0.8';
    edit.onclick = (e) => {
      e.stopPropagation();
      renameCategory(cat);
    };

    tools.appendChild(edit);

    if (appState.categories.length > 1) {
      const del = document.createElement('span');
      del.innerHTML = '&times;';
      del.title = 'Delete category';
      del.style.cursor = 'pointer';
      del.style.color = 'var(--led-red)';
      del.onclick = (e) => {
        e.stopPropagation();
        removeCategory(cat);
      };
      tools.appendChild(del);
    }

    btn.appendChild(tools);
    btn.onclick = () => selectCategory(cat);

    elements.categorySelector.appendChild(btn);
  });

  elements.manualEntryForm.category.innerHTML = appState.categories
    .map(cat => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`)
    .join('');
}

// ---------- RATINGS ----------
function renderAnxietyButtons() {
  renderRatingGroup(
    elements.preAnxietyButtons,
    appState.currentCall.preAnxiety,
    selectPreAnxiety
  );

  if (elements.postEaseButtons) {
    renderRatingGroup(
      elements.postEaseButtons,
      appState.currentCall.postEase,
      selectPostEase
    );
  }
}

function renderRatingGroup(container, selectedValue, onSelect) {
  if (!container) return;

  container.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `rating-btn ${selectedValue === i ? 'selected' : ''}`;
    btn.textContent = i;
    btn.onclick = () => onSelect(i);
    container.appendChild(btn);
  }
}

function selectPreAnxiety(value) {
  appState.currentCall.preAnxiety = value;
  renderAnxietyButtons();
  saveData();
}

function selectPostEase(value) {
  appState.currentCall.postEase = value;
  renderAnxietyButtons();
  saveData();
}

// ---------- RENDER LOGS ----------
function renderCallEntries() {
  renderWeeklyData();

  const todaysCalls = sortLogsDescending(getTodayLogs());
  elements.callEntriesContainer.innerHTML = '';

  if (!todaysCalls.length) {
    elements.callEntriesContainer.innerHTML = `
      <div style="text-align:center; padding:40px; color:var(--text-secondary);">
        No calls logged today. Start the timer to log your first one.
      </div>
    `;
    return;
  }

  todaysCalls.forEach(call => {
    const entry = document.createElement('div');
    entry.className = 'call-entry';

    const startLabel = call.startedAt
      ? new Date(call.startedAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
      : 'Manual entry';

    entry.innerHTML = `
      <div class="call-header">
        <div>
          <strong>${escapeHtml(call.category)}</strong>
          <div class="call-time">${startLabel} • ${formatTime(getDurationSeconds(call))}</div>
        </div>
        <div style="text-align:right;">
          <span class="ticker-value">${currencyFormatter.format(call.assetsReceivedValue || 0)}</span>
        </div>
      </div>

      <div class="call-meta" style="margin-bottom:5px; flex-wrap:wrap;">
        ${call.preAnxiety ? `<span>📊 Pre: ${call.preAnxiety}/5</span>` : ''}
        ${call.postEase ? `<span>😊 Post: ${call.postEase}/5</span>` : ''}
        ${call.prospectsLogged ? `<span>📈 Prospects: ${call.prospectsLogged}</span>` : ''}
        ${(call.assetsPendingValue || 0) > 0 ? `<span>⏳ Pending: ${currencyFormatter.format(call.assetsPendingValue)}</span>` : ''}
      </div>

      ${call.notes ? `<div class="call-note">"${escapeHtml(call.notes)}"</div>` : ''}
    `;

    elements.callEntriesContainer.appendChild(entry);
  });
}

function renderWeeklyData() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push({
      date: getLocalDateString(d),
      name: d.toLocaleDateString('en-US', { weekday: 'short' })
    });
  }

  const bestDayCalls = appState.benchmarks.bestDayCalls || 0;

  elements.weeklyData.innerHTML = `
    <div class="weekly-grid">
      ${days.map(day => {
        const dayLogs = appState.dailyLogs.filter(log => log.date === day.date);
        const calls = dayLogs.length;
        const seconds = dayLogs.reduce((sum, log) => sum + getDurationSeconds(log), 0);
        const isBest = bestDayCalls > 0 && calls === bestDayCalls;

        return `
          <div class="day-card" style="position:relative;">
            ${isBest ? '<span class="day-best">🏆 Best</span>' : ''}
            <div class="day-name">${day.name}</div>
            <div class="day-value">${calls}</div>
            <small>${formatTime(seconds)}</small>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// ---------- BENCHMARKS ----------
function getBenchmarkLogs() {
  const resetDate = appState.benchmarks.lastResetDate;
  if (!resetDate) return [...appState.dailyLogs];
  return appState.dailyLogs.filter(log => log.date >= resetDate);
}

function updateBenchmarks() {
  const logs = getBenchmarkLogs();
  const byDay = new Map();

  logs.forEach(log => {
    const existing = byDay.get(log.date) || 0;
    byDay.set(log.date, existing + 1);
  });

  const dayCounts = [...byDay.values()];
  appState.benchmarks.bestDayCalls = dayCounts.length ? Math.max(...dayCounts) : 0;
  appState.benchmarks.avgDailyCalls = dayCounts.length
    ? dayCounts.reduce((sum, n) => sum + n, 0) / dayCounts.length
    : 0;
}

// ---------- TICKER ----------
function updateTicker() {
  const todaysCalls = getTodayLogs();

  const totalCalls = todaysCalls.length;
  const completedSeconds = todaysCalls.reduce((sum, log) => sum + getDurationSeconds(log), 0);
  const liveSeconds = appState.timer.running ? appState.timer.elapsedSeconds : 0;
  const totalSeconds = completedSeconds + liveSeconds;

  const prospectsCount = todaysCalls.reduce((sum, log) => sum + (log.prospectsLogged || 0), 0);
  const assetsReceived = todaysCalls.reduce((sum, log) => sum + (log.assetsReceivedValue || 0), 0);
  const assetsPending = todaysCalls.reduce((sum, log) => sum + (log.assetsPendingValue || 0), 0);

  const streak = calculateStreak();
  const avgDailyCalls = appState.benchmarks.avgDailyCalls || 0;
  const diff = totalCalls - avgDailyCalls;

  elements.tickerBar.callsToday.textContent = String(totalCalls);
  elements.tickerBar.timeSpent.textContent = formatTime(totalSeconds);
  elements.tickerBar.prospectsCount.textContent = String(prospectsCount);
  elements.tickerBar.assetsReceived.textContent = currencyFormatter.format(assetsReceived);
  elements.tickerBar.assetsPending.textContent = currencyFormatter.format(assetsPending);
  elements.tickerBar.streakCount.textContent = `🔥${streak}`;

  if (appState.dailyLogs.length) {
    elements.tickerBar.todayVsAvg.textContent = `${totalCalls} today / ${avgDailyCalls.toFixed(1)} avg`;

    if (diff > 0.25) {
      elements.tickerBar.trendArrow.textContent = '⬆️';
    } else if (diff < -0.25) {
      elements.tickerBar.trendArrow.textContent = '⬇️';
    } else {
      elements.tickerBar.trendArrow.textContent = '➡️';
    }
  } else {
    elements.tickerBar.todayVsAvg.textContent = 'vs 0 calls';
    elements.tickerBar.trendArrow.textContent = '';
  }
}

function calculateStreak() {
  const uniqueDays = new Set(appState.dailyLogs.map(log => log.date));
  let streak = 0;

  for (let i = 0; i < 365; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = getLocalDateString(d);

    if (uniqueDays.has(key)) {
      streak++;
    } else if (i > 0) {
      break;
    }
  }

  return streak;
}

// ---------- INSIGHTS ----------
function generateInsight() {
  const logs = sortLogsAscending(appState.dailyLogs);
  const todayLogs = sortLogsAscending(getTodayLogs());

  const insightFns = [
    // 1) Anxiety bias / prediction mismatch
    () => {
      const rated = logs.filter(l => l.preAnxiety && l.postEase);
      if (rated.length < 3) return null;

      const avgPre = rated.reduce((sum, l) => sum + l.preAnxiety, 0) / rated.length;
      const avgPost = rated.reduce((sum, l) => sum + l.postEase, 0) / rated.length;

      if (avgPre >= 3.5 && avgPost >= 3) {
        return `Prediction gap showing up: you tend to approach calls with <span class="insight-highlight">${avgPre.toFixed(1)}/5</span> pre-call anxiety, but your average post-call ease is <span class="insight-highlight">${avgPost.toFixed(1)}/5</span>. That's useful evidence that anticipation may be overstating the threat.`;
      }
      return null;
    },

    // 2) Warm-up effect
    () => {
      const ratedToday = todayLogs.filter(l => l.preAnxiety);
      if (ratedToday.length < 2) return null;

      const first = ratedToday[0].preAnxiety;
      const last = ratedToday[ratedToday.length - 1].preAnxiety;

      if (first >= last + 1) {
        return `Warm-up effect: your first rated call today was <span class="insight-highlight">${first}/5</span> on anxiety, and later calls dropped to <span class="insight-highlight">${last}/5</span>. Use an easy opener call to lower the friction on the harder ones.`;
      }
      return null;
    },

    // 3) Streak
    () => {
      const streak = calculateStreak();

      if (streak >= 10) {
        return `Momentum is real: you’re on a <span class="insight-highlight">${streak}-day streak</span>. At this point, consistency starts to feel less like effort and more like identity.`;
      }

      if (streak >= 5) {
        return `You’ve built a <span class="insight-highlight">${streak}-day streak</span>. Protecting existing momentum is often easier than restarting from zero.`;
      }

      return null;
    },

    // 4) Revenue efficiency
    () => {
      const totalRevenue = todayLogs.reduce((sum, l) => sum + (l.assetsReceivedValue || 0), 0);
      const totalSeconds = todayLogs.reduce((sum, l) => sum + getDurationSeconds(l), 0);

      if (totalRevenue <= 0 || totalSeconds <= 0) return null;

      const revenuePerHour = (totalRevenue / totalSeconds) * 3600;

      const allRevenue = appState.dailyLogs.reduce((sum, l) => sum + (l.assetsReceivedValue || 0), 0);
      const allSeconds = appState.dailyLogs.reduce((sum, l) => sum + getDurationSeconds(l), 0);
      const historicalRph = allSeconds > 0 ? (allRevenue / allSeconds) * 3600 : 0;

      if (historicalRph > 0 && revenuePerHour > historicalRph * 1.15) {
        return `Strong efficiency day: you're tracking at <span class="insight-highlight">${currencyFormatter.format(revenuePerHour)}/hour</span>, ahead of your historical pace of <span class="insight-highlight">${currencyFormatter.format(historicalRph)}/hour</span>.`;
      }

      if (totalRevenue > 0) {
        return `Value creation is showing up: <span class="insight-highlight">${currencyFormatter.format(totalRevenue)}</span> received today. That's tangible reinforcement for the work.`;
      }

      return null;
    },

    // 5) Benchmark chase
    () => {
      const todayCount = todayLogs.length;
      const best = appState.benchmarks.bestDayCalls || 0;

      if (best > 0 && todayCount > 0 && todayCount < best) {
        const remaining = best - todayCount;
        if (remaining <= 3) {
          return `You’re <span class="insight-highlight">${remaining}</span> logged call(s) away from matching your best benchmark day of <span class="insight-highlight">${best}</span>.`;
        }
      }
      return null;
    },

    // Fallbacks
    () => {
      if (todayLogs.length > 0) {
        return `You’ve logged <span class="insight-highlight">${todayLogs.length}</span> item(s) today. Small wins compound when they’re visible.`;
      }

      if (appState.dailyLogs.length > 0) {
        return `Your tracker already holds <span class="insight-highlight">${appState.dailyLogs.length}</span> historical entries. That gives you real signal, not vibes.`;
      }

      return `Start with one entry. Action reduces uncertainty faster than thinking about action.`;
    }
  ];

  for (const fn of insightFns) {
    const result = fn();
    if (result) {
      elements.insightContent.innerHTML = result;
      return;
    }
  }
}

// ---------- AUDIO ----------
function playClickSound(type = 'click') {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    const settings = {
      click: { freq: 800, dur: 0.08, gain: 0.07 },
      start: { freq: 600, dur: 0.12, gain: 0.10 },
      stop:  { freq: 400, dur: 0.14, gain: 0.10 },
      reset: { freq: 300, dur: 0.18, gain: 0.08 }
    }[type] || { freq: 700, dur: 0.08, gain: 0.06 };

    osc.frequency.value = settings.freq;
    gain.gain.setValueAtTime(settings.gain, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + settings.dur);

    osc.start(now);
    osc.stop(now + settings.dur);
  } catch (err) {
    console.warn('Audio unavailable:', err);
  }
}

function resetBenchmarks() {
  elements.resetModal.classList.add('show');
}

function confirmReset() {
  appState.benchmarks = {
    bestDayCalls: 0,
    avgDailyCalls: 0,
    lastResetDate: getLocalDateString()
  };

  closeModal();
  updateTicker();
  renderCallEntries();
  generateInsight();
  saveData();
}

function closeModal() {
  elements.resetModal.classList.remove('show');
}

// ---------- DISPLAY HELPERS ----------
function formatTime(totalSeconds) {
  const seconds = Math.max(0, toInt(totalSeconds));
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;

  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}
